name: Check medication reminders

on:
  schedule:
    # Every 5 minutes — the minimum interval GitHub Actions supports.
    # GitHub does not guarantee scheduled runs fire on time and may delay or
    # skip them by hours under load, so this should not be the only mechanism
    # relied on for time-sensitive caregiver alerts. See render.yaml for a
    # recommended external cron pinger that calls the same endpoint.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call check-reminders endpoint
        run: |
          curl -sf -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/check-reminders"
