<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VitalWatch</title>

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#1A6B3C',
              dark: '#14572F',
              darker: '#0F4324',
              light: '#E8F5E9',
              tint: '#F2F9F4',
              50: '#F2F9F4',
              100: '#E8F5E9',
              200: '#CDE9D3',
            },
          },
          fontFamily: {
            sans: ['Geist', 'Inter', 'system-ui', 'sans-serif'],
            mono: ['Geist Mono', 'ui-monospace', 'monospace'],
          },
          borderRadius: {
            xl: '0.75rem',
            '2xl': '1rem',
          },
          boxShadow: {
            sm: '0 1px 2px 0 rgba(16,24,40,0.05), 0 1px 3px 0 rgba(16,24,40,0.04)',
            card: '0 1px 3px rgba(16,24,40,0.06), 0 1px 2px rgba(16,24,40,0.04)',
          },
        },
      },
    };
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    body { font-family: 'Geist', 'Inter', system-ui, sans-serif; background: #F6F8F7; color: #18211C; }
    * { -webkit-tap-highlight-color: transparent; }
    ::selection { background: #1A6B3C; color: #fff; }

    /* Scrollbars */
    .vw-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
    .vw-scroll::-webkit-scrollbar-thumb { background: #d4ddd7; border-radius: 8px; }
    .vw-scroll::-webkit-scrollbar-track { background: transparent; }

    /* Entrance animations for PERSISTENT content use transform only — never
       opacity — so content stays visible if animations are paused (background
       tab, reduced-motion, print). Opacity fades are reserved for transient,
       user-triggered UI (modals, dropdowns, toasts) which only appear when the
       document is visible. */
    @keyframes vw-fade-up { from { transform: translateY(10px); } to { transform: none; } }
    @keyframes vw-fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes vw-scale-in { from { opacity: 0; transform: translateY(10px) scale(.98); } to { opacity: 1; transform: none; } }
    @keyframes vw-spin { to { transform: rotate(360deg); } }
    @keyframes vw-toast-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    .vw-spin { animation: vw-spin .8s linear infinite; }
    .vw-toast-in { animation: vw-toast-in .28s cubic-bezier(.16,1,.3,1) both; }

    @media (prefers-reduced-motion: no-preference) {
      .vw-fade-up { animation: vw-fade-up .4s cubic-bezier(.16,1,.3,1) both; }
      .vw-fade { animation: vw-fade .3s ease both; }
      .vw-scale-in { animation: vw-scale-in .22s cubic-bezier(.16,1,.3,1) both; }
      .vw-stagger > * { animation: vw-fade-up .45s cubic-bezier(.16,1,.3,1) both; }
      .vw-stagger > *:nth-child(1){animation-delay:.02s}
      .vw-stagger > *:nth-child(2){animation-delay:.06s}
      .vw-stagger > *:nth-child(3){animation-delay:.10s}
      .vw-stagger > *:nth-child(4){animation-delay:.14s}
    }

    input:focus, select:focus, textarea:focus, button:focus { outline: none; }
  </style>
</head>
<body>
  <div id="root">
    <div style="height:100vh;display:flex;align-items:center;justify-content:center;color:#1A6B3C;font-family:'Geist',sans-serif;">
      <div style="display:flex;gap:12px;align-items:center;font-weight:600;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="#1A6B3C" stroke="#fff" stroke-width="1.5"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
        Loading VitalWatch…
      </div>
    </div>
  </div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/chart.jsx"></script>
  <script type="text/babel" src="src/layout.jsx"></script>

  <script type="text/babel" src="src/medication.jsx"></script>

  <script type="text/babel" src="src/page_caregiver.jsx"></script>
  <script type="text/babel" src="src/page_settings.jsx"></script>
  <script type="text/babel" src="src/page_auth.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
