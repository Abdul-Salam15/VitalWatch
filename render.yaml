# Render Blueprint — sized for Render's free tier.
#
# Free tier notes:
# - The free Postgres plan provides 1GB storage and expires 30 days after
#   creation (14-day grace period to upgrade before data is deleted).
# - The free web service plan spins down after 15 minutes of inactivity and
#   takes ~1 minute to spin back up on the next request.
# - Render cron jobs are NOT available on the free tier (min $1/mo), so the
#   /api/cron/check-reminders endpoint is instead triggered by a free
#   scheduled GitHub Actions workflow (see .github/workflows/check-reminders.yml).
#
# Reliable medication reminders when the app is closed:
# - GitHub Actions schedules are best-effort — GitHub may delay or skip
#   scheduled runs by hours under load, so the workflow above alone cannot
#   guarantee on-time caregiver escalation emails.
# - For guaranteed delivery, point a free external HTTP monitor (e.g.
#   cron-job.org or an UptimeRobot heartbeat monitor) at the same endpoint
#   every 1-5 minutes:
#     GET https://<APP_URL>/api/cron/check-reminders
#     Header: Authorization: Bearer <CRON_SECRET>
#   - <APP_URL> is this service's Render URL (same value as NEXT_PUBLIC_APP_URL).
#   - <CRON_SECRET> is generated by Render for this service (see envVars
#     below) — find it under the service's "Environment" tab in the Render
#     dashboard.
#   The endpoint is safe to call repeatedly: it only sends each reminder /
#   escalation email once per dose per day, tracked via
#   DoseRecord.reminderEmailSentAt / escalationEmailSentAt.
databases:
  - name: vitalwatch-db
    plan: free
    databaseName: vitalwatch
    user: vitalwatch

services:
  - type: web
    name: vitalwatch
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vitalwatch-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM_NAME
        value: VitalWatch
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: CRON_SECRET
        generateValue: true
